<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Proyectos</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <h1 class="logo"><span>{</span>devBernix<span>}</span></h1>
    <button id="themeToggle">☀</button>
  </header>

  <section class="hero">
    <p class="tag">— mis proyectos</p>
    <h2 class="title">Portfolio</h2>
  </section>

  <main class="grid">

    <!-- PROYECTO 1 -->
    <div class="card">
      <span class="number">01</span>
      <h3>Simple Comment Box</h3>
      <p>Contenedor simulando un comentario, se muestran los comentarios donde se pueden eliminar.</p>
      <a href="Comentador-Simple/index.html" class="btn">Ver proyecto →</a>
    </div>

    <!-- PROYECTO 2 -->
    <div class="card">
      <span class="number">02</span>
      <h3>Password Generator</h3>
      <p>Generador de contraseñas con niveles de dificultad y copia al portapapeles.</p>
      <a href="Generador-Contraseñas/index.html" class="btn">Ver proyecto →</a>
    </div>

    
  </main>

  <footer>
    <p>© <span id="year"></span></p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const toggle = document.getElementById("themeToggle");
    const html = document.documentElement;
    const saved = localStorage.getItem("theme") || "dark";
    html.setAttribute("data-theme", saved);
    toggle.textContent = saved === "dark" ? "☀" : "☾";

    toggle.addEventListener("click", () => {
      const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
      html.setAttribute("data-theme", next);
      toggle.textContent = next === "dark" ? "☀" : "☾";
      localStorage.setItem("theme", next);
    });
  </script>

</body>
</html>
