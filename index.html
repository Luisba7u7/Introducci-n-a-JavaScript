<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Caja de Comentarios</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <h1>Simple Comment Box</h1>
    <section class="comments-box">
        <form action="">
            <div class="user">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGm8-Zq94mGM11kBpKhX_Ru5WixZHBQKku6w&s">
                <input type="text" placeholder="Inserte tu nombre">

            </div>
            <textarea placeholder="Tu comentario..."></textarea>
            <button>Comentar</button>


        </form>
    </section>
    
    

    
    <script src="Simple-Comment-Box.js"></script>
</body>
</html>
